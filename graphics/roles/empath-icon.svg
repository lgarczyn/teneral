  <line x1="45" y1="72" x2="45" y2="80" stroke="#a06fff" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="62" y1="15" x2="58" y2="22" stroke="#a06fff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="28" y1="15" x2="32" y2="22" stroke="#a06fff" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="75" y1="30" x2="69" y2="35" stroke="#a06fff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="15" y1="30" x2="21" y2="35" stroke="#a06fff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
