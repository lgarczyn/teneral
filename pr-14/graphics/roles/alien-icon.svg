<svg class="sigil" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Spaceship body -->
  <ellipse cx="45" cy="44" rx="10" ry="6" stroke="#b06aff" stroke-width="1.2" fill="#b06aff" opacity="0.12"/>
  <!-- Cockpit dome -->
  <path d="M39 44 Q45 36 51 44" stroke="#b06aff" stroke-width="1" fill="#b06aff" opacity="0.08"/>
  <!-- Wings -->
  <path d="M35 46 L25 52 L35 50" stroke="#b06aff" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M55 46 L65 52 L55 50" stroke="#b06aff" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Engine glow -->
  <ellipse cx="45" cy="50" rx="4" ry="2" fill="#b06aff" opacity="0.3"/>

  <!-- Tentacle 1 - top left, curling inward -->
  <path d="M20 15 C18 22 22 28 28 32 C34 36 38 40 36 46" stroke="#b06aff" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <circle cx="36" cy="47" r="1.5" fill="#b06aff" opacity="0.5"/>

  <!-- Tentacle 2 - top right -->
  <path d="M70 15 C72 22 68 28 62 32 C56 36 52 40 54 46" stroke="#b06aff" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <circle cx="54" cy="47" r="1.5" fill="#b06aff" opacity="0.5"/>

  <!-- Tentacle 3 - left, low -->
  <path d="M10 45 C14 42 20 43 26 45 C32 47 36 48 37 50" stroke="#b06aff" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <circle cx="37" cy="51" r="1.5" fill="#b06aff" opacity="0.5"/>

  <!-- Tentacle 4 - right, low -->
  <path d="M80 45 C76 42 70 43 64 45 C58 47 54 48 53 50" stroke="#b06aff" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <circle cx="53" cy="51" r="1.5" fill="#b06aff" opacity="0.5"/>

  <!-- Tentacle 5 - bottom left -->
  <path d="M18 72 C22 65 28 60 34 57 C38 55 41 53 42 51" stroke="#b06aff" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <circle cx="42" cy="51" r="1.5" fill="#b06aff" opacity="0.5"/>

  <!-- Tentacle 6 - bottom right -->
  <path d="M72 72 C68 65 62 60 56 57 C52 55 49 53 48 51" stroke="#b06aff" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <circle cx="48" cy="51" r="1.5" fill="#b06aff" opacity="0.5"/>

  <!-- Ambient glow ring -->
  <circle cx="45" cy="44" r="32" stroke="#b06aff" stroke-width="0.4" stroke-dasharray="1 5" opacity="0.2"/>
</svg>
